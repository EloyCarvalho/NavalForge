  <text x="70" y="612" font-size="28" font-weight="700" fill="#1f2937">Leitura de Engenharia</text>
  <text x="70" y="660" font-size="20" fill="#1f2937">• Faixa mais razoável desta configuração: 26–30 nós</text>
