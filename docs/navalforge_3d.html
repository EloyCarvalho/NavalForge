<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NavalForge 3D Online</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#07111f;color:#e5eef9}header{padding:14px;background:#0f172a;border-bottom:1px solid #22344d;position:sticky;top:0;z-index:3}h1{margin:0;font-size:24px}p{color:#9fb2ca}.wrap{display:grid;grid-template-columns:360px 1fr;gap:12px;padding:12px;max-width:1280px;margin:auto}.panel,.card{background:#0f172a;border:1px solid #22344d;border-radius:16px;padding:12px}.control{margin:9px 0}.control label{display:flex;justify-content:space-between;color:#9fb2ca;font-size:13px}.control input{width:100%;accent-color:#45c2ff}input,select{width:100%;padding:10px;border-radius:10px;background:#020617;color:#e5eef9;border:1px solid #334155}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}.card b{display:block;font-size:21px;margin-top:6px}button{background:#0b1220;color:#e5eef9;border:1px solid #334155;border-radius:10px;padding:9px;font-weight:700}.buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}#viewer{height:520px;background:#020617;border:1px solid #22344d;border-radius:16px;overflow:hidden;touch-action:none}.note{font-size:12px;color:#9fb2ca}.badge{display:inline-block;padding:7px 10px;border-radius:999px;background:#064e3b;color:#bbf7d0;font-weight:800;font-size:12px;margin-top:8px}@media(max-width:900px){.wrap{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}#viewer{height:430px}}</style></head><body><header><h1>NavalForge 3D Online</h1><p>Casco 3D rotacionável. Toque/arraste para girar. Ajuste os parâmetros e veja o casco atualizar.</p></header><div class="wrap"><section class="panel"><input id="name" value="Lancha Conceito 12 m"><div class="control"><label>Tipo <b id="typeTxt">Center Console</b></label><select id="type"><option value="center">Center Console</option><option value="open">Open Boat</option><option value="bow">Bowrider</option><option value="work">Utilitária</option></select></div><div id="controls"></div><div class="buttons"><button onclick="preset(1)">Lancha</button><button onclick="preset(2)">Planante</button><button onclick="preset(3)">Pesado</button><button onclick="resetCamera()">Resetar câmera</button></div><p class="note">Modelo 3D conceitual. Não substitui Rhino/Orca3D, Savitsky validado, curvas hidrostáticas, GZ, CFD ou RT.</p></section><section><div class="cards"><div class="card">Deslocamento<b id="disp">-</b></div><div class="card">Regime<b id="reg">-</b></div><div class="card">GMt<b id="gm">-</b></div><div class="card">Potência<b id="pow">-</b></div></div><div id="viewer"></div><div class="panel" style="margin-top:10px"><span id="badge" class="badge">OK PRELIMINAR</span><p id="diag" class="note"></p></div></section></div><script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script><script>const RHO=1025,G=9.80665,K=.514444;const defs=[['lwl','LWL','m',6,30,.1,12],['beam','Boca','m',1.8,8,.05,3.2],['draft','Calado','m',.2,2,.01,.55],['speed','Velocidade','kn',0,45,.5,22],['dead','Deadrise','°',0,30,.5,15],['cb','Cb','',.2,.85,.01,.42],['cp','Cp','',.3,.9,.01,.65],['cwp','Cwp','',.4,.95,.01,.78],['vcg','VCG','m',.2,3,.01,1.1],['eff','Eficiência','',.2,.8,.01,.55],['pass','Passageiros','',0,20,1,6],['fuel','Combustível','L',0,1200,10,300],['cargo','Carga','kg',0,4000,50,250]];const q=id=>document.getElementById(id),v=id=>parseFloat(q(id).value),f=(n,d=1)=>Number(n).toLocaleString('pt-BR',{maximumFractionDigits:d,minimumFractionDigits:d});q('controls').innerHTML=defs.map(d=>'<div class=control><label>'+d[1]+' <b id="'+d[0]+'Txt">'+d[6]+'</b></label><input id="'+d[0]+'" type=range min="'+d[3]+'" max="'+d[4]+'" step="'+d[5]+'" value="'+d[6]+'"></div>').join('');let scene,camera,renderer,orb,boat;init();function init(){const el=q('viewer');scene=new THREE.Scene();scene.background=new THREE.Color(0x020617);camera=new THREE.PerspectiveCamera(45,el.clientWidth/el.clientHeight,.1,1000);camera.position.set(7,4,8);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(el.clientWidth,el.clientHeight);el.appendChild(renderer.domElement);orb=new THREE.OrbitControls(camera,renderer.domElement);orb.enableDamping=true;orb.target.set(0,0,0);scene.add(new THREE.HemisphereLight(0xffffff,0x203040,2));let dl=new THREE.DirectionalLight(0xffffff,2);dl.position.set(5,8,7);scene.add(dl);let grid=new THREE.GridHelper(18,18,0x2563eb,0x1e293b);grid.position.y=-1.05;scene.add(grid);boat=new THREE.Group();scene.add(boat);window.addEventListener('resize',resize);animate();update()}function calc(){let L=v('lwl'),B=v('beam'),T=v('draft'),V=v('speed')*K,cb=v('cb'),cwp=v('cwp'),vcg=v('vcg'),eff=v('eff');let disp=L*B*T*cb*RHO+v('pass')*85+v('fuel')*.74+v('cargo');let vol=disp/RHO,fn=V/Math.sqrt(G*L),reg=fn<.35?'Deslocante':fn<.75?'Semi':'Planante';let gm=.53*T+(L*B**3*cwp/12)/vol-vcg;let wett=L*(2*T+B)*.85,re=Math.max(V*L/1.188e-6,1),cf=V>0?.075/(Math.log10(re)-2)**2:0,ct=(reg==='Planante'?1.4:1.25)*cf+(reg==='Planante'?.003:.0018),R=.5*RHO*V*V*wett*ct,pow=(R*V/1000)/Math.max(eff,.05)*1.15;return{L,B,T,cb,cp:v('cp'),fn,reg,gm,pow,disp,type:q('type').value}}function meshHull(r){let n=36,verts=[],idx=[];for(let i=0;i<=n;i++){let s=i/n,x=(s-.5)*r.L,env=Math.sin(Math.PI*Math.min(1,s*1.02)),bow=.12+.88*Math.pow(1-s,.55),full=.85+.35*(r.cb-.42),half=Math.max(.02,.5*r.B*env*bow*full),deck=.16*r.T+.09*r.T*Math.sin(Math.PI*s)+.22*r.T*s*s,keel=-r.T*(.9+.12*Math.pow(1-s,1.3)),chine=keel+r.T*(.46+.06*(1-s));verts.push(-half*.58,deck,x, half*.58,deck,x, -half,chine,x, half,chine,x, 0,keel,x)}let st=5;for(let i=0;i<n;i++){let a=i*st,b=(i+1)*st;idx.push(a,a+1,b+1,a,b+1,b,a,a+2,b+2,a,b+2,b,a+1,b+1,b+3,a+1,b+3,a+3,a+2,a+4,b+4,a+2,b+4,b+2,a+3,b+3,b+4,a+3,b+4,a+4)}let g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));g.setIndex(idx);g.computeVertexNormals();return g}function rebuild(){let r=calc();boat.clear();let hull=new THREE.Mesh(meshHull(r),new THREE.MeshStandardMaterial({color:0x35bdf4,roughness:.42,side:THREE.DoubleSide}));boat.add(hull);let deck=new THREE.Mesh(meshHull({...r,T:r.T*.82}),new THREE.MeshStandardMaterial({color:0xf1f5f9,roughness:.55,side:THREE.DoubleSide}));deck.scale.set(.82,.25,.92);deck.position.y=.11;boat.add(deck);let con=new THREE.Mesh(new THREE.BoxGeometry(.55,.55,.85),new THREE.MeshStandardMaterial({color:0x111827,roughness:.45}));con.position.set(0,.45,-.15);boat.add(con);let glass=new THREE.Mesh(new THREE.BoxGeometry(.45,.35,.08),new THREE.MeshStandardMaterial({color:0xdbeafe,transparent:true,opacity:.75}));glass.position.set(0,.9,-.22);boat.add(glass);let motor=new THREE.Mesh(new THREE.BoxGeometry(.42,.75,.42),new THREE.MeshStandardMaterial({color:0x111827,roughness:.55}));motor.position.set(0,.05,-r.L*.55);boat.add(motor);q('disp').textContent=f(r.disp,0)+' kg';q('reg').textContent=r.reg;q('gm').textContent=f(r.gm,2)+' m';q('pow').textContent=f(r.pow,1)+' kW';q('typeTxt').textContent=q('type').selectedOptions[0].textContent;defs.forEach(d=>q(d[0]+'Txt').textContent=f(v(d[0]),d[5]<.1?2:0)+(d[2]?' '+d[2]:''));q('diag').textContent='Fn '+f(r.fn,3)+' · '+r.reg+'. Arraste o casco para girar. Modelo conceitual para visualização rápida.';q('badge').textContent=r.gm>.35?'OK PRELIMINAR':r.gm>0?'ATENÇÃO':'CRÍTICO';q('badge').style.background=r.gm>.35?'#064e3b':r.gm>0?'#713f12':'#7f1d1d'}function resize(){let el=q('viewer');camera.aspect=el.clientWidth/el.clientHeight;camera.updateProjectionMatrix();renderer.setSize(el.clientWidth,el.clientHeight)}function animate(){requestAnimationFrame(animate);orb.update();renderer.render(scene,camera)}function update(){rebuild()}window.resetCamera=()=>{camera.position.set(7,4,8);orb.target.set(0,0,0);orb.update()};window.preset=n=>{if(n===1){q('type').value='center';q('lwl').value=12;q('beam').value=3.2;q('draft').value=.55;q('speed').value=22;q('cb').value=.42;q('cp').value=.65;q('cwp').value=.78;q('vcg').value=1.1}if(n===2){q('type').value='bow';q('lwl').value=9;q('beam').value=2.7;q('draft').value=.42;q('speed').value=34;q('cb').value=.36;q('cp').value=.72;q('cwp').value=.75;q('vcg').value=.95}if(n===3){q('type').value='work';q('lwl').value=14;q('beam').value=4.3;q('draft').value=.95;q('speed').value=14;q('cb').value=.58;q('cp').value=.66;q('cwp').value=.82;q('vcg').value=1.55}update()};document.addEventListener('input',e=>{if(e.target.matches('input,select'))update()});</script></body></html>
