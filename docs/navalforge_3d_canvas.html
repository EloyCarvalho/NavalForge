<!doctype html><html lang='pt-BR'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>NavalForge 3D Canvas</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#07111f;color:#e5eef9}header{padding:14px;background:#0f172a;border-bottom:1px solid #22344d;position:sticky;top:0;z-index:2}h1{margin:0;font-size:23px}p{color:#9fb2ca}.wrap{display:grid;grid-template-columns:360px 1fr;gap:12px;padding:12px;max-width:1280px;margin:auto}.panel,.card{background:#0f172a;border:1px solid #22344d;border-radius:16px;padding:12px}.control{margin:9px 0}.control label{display:flex;justify-content:space-between;color:#9fb2ca;font-size:13px}.control input{width:100%;accent-color:#45c2ff}input,select{width:100%;padding:10px;border-radius:10px;background:#020617;color:#e5eef9;border:1px solid #334155}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}.card b{display:block;font-size:21px;margin-top:6px}.buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}button{background:#0b1220;color:#e5eef9;border:1px solid #334155;border-radius:10px;padding:9px;font-weight:700}canvas{display:block;width:100%;height:500px;background:#020617;border-radius:16px;touch-action:none}.note{font-size:12px;color:#9fb2ca}.badge{display:inline-block;padding:7px 10px;border-radius:999px;background:#064e3b;color:#bbf7d0;font-weight:800;font-size:12px;margin-top:8px}@media(max-width:900px){.wrap{grid-template-columns:1fr}.cards{grid-template-columns:1fr 1fr}canvas{height:430px}}</style></head><body><header><h1>NavalForge 3D Canvas</h1><p>Casco pseudo-3D rotacionûÀvel por toque. VersûÈo corrigida com cûÂmera 3/4 e mais volume aparente.</p></header><div class='wrap'><section class='panel'><input id='name' value='Lancha Conceito 12 m'><div class='control'><label>Tipo <b id='typeTxt'>Center Console</b></label><select id='type'><option value='center'>Center Console</option><option value='open'>Open Boat</option><option value='bow'>Bowrider</option><option value='work'>UtilitûÀria</option></select></div><div id='controls'></div><div class='buttons'><button onclick='preset(1)'>Lancha</button><button onclick='preset(2)'>Planante</button><button onclick='preset(3)'>Pesado</button><button onclick='resetView()'>Resetar vista</button></div><p class='note'>Arraste o casco com o dedo. Modelo visual/conceitual; nûÈo substitui projeto naval completo.</p></section><section><div class='cards'><div class='card'>Deslocamento<b id='disp'>-</b></div><div class='card'>Regime<b id='reg'>-</b></div><div class='card'>GMt<b id='gm'>-</b></div><div class='card'>Potûˆncia<b id='pow'>-</b></div></div><canvas id='cv' width='900' height='560'></canvas><div class='panel' style='margin-top:10px'><span id='badge' class='badge'>OK PRELIMINAR</span><p id='diag' class='note'></p></div></section></div><script>var RHO=1025,G=9.80665,K=.514444;var defs=[['lwl','LWL','m',6,30,.1,12],['beam','Boca','m',1.8,8,.05,3.2],['draft','Calado','m',.2,2,.01,.55],['speed','Velocidade','kn',0,45,.5,22],['dead','Deadrise','ô¯',0,30,.5,15],['cb','Cb','',.2,.85,.01,.42],['cp','Cp','',.3,.9,.01,.65],['cwp','Cwp','',.4,.95,.01,.78],['vcg','VCG','m',.2,3,.01,1.1],['eff','Eficiûˆncia','',.2,.8,.01,.55],['pass','Passageiros','',0,20,1,6],['fuel','CombustûÙvel','L',0,1200,10,300],['cargo','Carga','kg',0,4000,50,250]];function q(id){return document.getElementById(id)}function v(id){return parseFloat(q(id).value)}function fmt(n,d){return Number(n).toLocaleString('pt-BR',{maximumFractionDigits:d,minimumFractionDigits:d})}q('controls').innerHTML=defs.map(function(d){return '<div class=control><label>'+d[1]+' <b id='+d[0]+'Txt>'+d[6]+'</b></label><input id='+d[0]+' type=range min='+d[3]+' max='+d[4]+' step='+d[5]+' value='+d[6]+'></div>'}).join('');var yaw=-0.72,pitch=0.42,drag=false,lx=0,ly=0;function calc(spd){var L=v('lwl'),B=v('beam'),T=v('draft'),Vkn=spd==null?v('speed'):spd,V=Vkn*K,cb=v('cb'),cwp=v('cwp'),vcg=v('vcg'),eff=v('eff');var disp=L*B*T*cb*RHO+v('pass')*85+v('fuel')*.74+v('cargo'),vol=disp/RHO,fn=V/Math.sqrt(G*L),reg=fn<.35?'Deslocante':fn<.75?'Semi':'Planante';var gm=.53*T+(L*Math.pow(B,3)*cwp/12)/vol-vcg,wett=L*(2*T+B)*.85,re=Math.max(V*L/1.188e-6,1),cf=V>0?.075/Math.pow(Math.log10(re)-2,2):0,ct=(reg==='Planante'?1.4:1.25)*cf+(reg==='Planante'?.003:.0018),R=.5*RHO*V*V*wett*ct,pow=(R*V/1000)/Math.max(eff,.05)*1.15;return{L:L,B:B,T:T,Vkn:Vkn,cb:cb,cp:v('cp'),dead:v('dead'),disp:disp,fn:fn,reg:reg,gm:gm,pow:pow,type:q('type').value}}function sections(r){var n=22,arr=[];for(var i=0;i<=n;i++){var s=i/n,x=(s-.5)*r.L;var env=Math.sin(Math.PI*Math.min(1,s*1.02));var bow=.14+.86*Math.pow(1-s,.50);var full=.85+.38*(r.cb-.42);var half=Math.max(.04,.5*r.B*env*bow*full);var deck=.16*r.T+.08*r.T*Math.sin(Math.PI*s)+.20*r.T*s*s;var keel=-r.T*(.92+.10*Math.pow(1-s,1.3));var chine=keel+r.T*(.50+.05*(1-s));arr.push({x:x,hd:half*.68,hs:half,deck:deck,chine:chine,keel:keel})}return arr}function project(p){var cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pitch),sp=Math.sin(pitch);var x=p.x,y=p.y,z=p.z;var x1=x*cy-y*sy;var y1=x*sy+y*cy;var y2=y1*cp-z*sp;var z2=y1*sp+z*cp;var sc=42*(780/(780+y2*28+210));return{x:q('cv').width/2+x1*sc,y:q('cv').height*.58-z2*sc,z:y2}}function poly(ctx,pts,fill,stroke){ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke||'rgba(224,242,254,.65)';ctx.lineWidth=1.15;ctx.stroke()}function draw(){var r=calc(),cv=q('cv'),ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);ctx.fillStyle='#020617';ctx.fillRect(0,0,cv.width,cv.height);ctx.strokeStyle='rgba(37,99,235,.35)';for(var g=0;g<8;g++){ctx.beginPath();ctx.moveTo(0,110+g*55);ctx.lineTo(cv.width,110+g*55);ctx.stroke()}var sec=sections(r),faces=[];for(var i=0;i<sec.length-1;i++){var a=sec[i],b=sec[i+1];function P(s,side,part){var y=0,z=0;if(part==='deck'){y=side*s.hd;z=s.deck}else if(part==='side'){y=side*s.hs;z=s.chine}else{y=0;z=s.keel}return{x:s.x,y:y,z:z}}faces.push([P(a,-1,'deck'),P(a,1,'deck'),P(b,1,'deck'),P(b,-1,'deck'),'#eef6ff']);faces.push([P(a,-1,'deck'),P(b,-1,'deck'),P(b,-1,'side'),P(a,-1,'side'),'#55c8fa']);faces.push([P(a,1,'deck'),P(a,1,'side'),P(b,1,'side'),P(b,1,'deck'),'#2db3e8']);faces.push([P(a,-1,'side'),P(b,-1,'side'),P(b,0,'keel'),P(a,0,'keel'),'#187fb1']);faces.push([P(a,1,'side'),P(a,0,'keel'),P(b,0,'keel'),P(b,1,'side'),'#0d6e9e'])}faces=faces.map(function(f){var pts=f.slice(0,4).map(project);var z=(pts[0].z+pts[1].z+pts[2].z+pts[3].z)/4;return{pts:pts,color:f[4],z:z}}).sort(function(a,b){return a.z-b.z});for(i=0;i<faces.length;i++)poly(ctx,faces[i].pts,faces[i].color);var c=[{x:-.45,y:-.32,z:.26},{x:-.45,y:.32,z:.26},{x:.18,y:.28,z:.80},{x:.18,y:-.28,z:.80}].map(project);poly(ctx,c,'#111827','#93c5fd');var wind=[{x:-.18,y:-.25,z:.80},{x:-.18,y:.25,z:.80},{x:.06,y:.20,z:1.05},{x:.06,y:-.20,z:1.05}].map(project);poly(ctx,wind,'rgba(219,234,254,.75)','#bfdbfe');ctx.fillStyle='#dbeafe';ctx.font='18px Arial';ctx.fillText(q('name').value+' ôñ casco 3D canvas',18,30);q('disp').textContent=fmt(r.disp,0)+' kg';q('reg').textContent=r.reg;q('gm').textContent=fmt(r.gm,2)+' m';q('pow').textContent=fmt(r.pow,1)+' kW';q('typeTxt').textContent=q('type').selectedOptions[0].textContent;defs.forEach(function(d){q(d[0]+'Txt').textContent=fmt(v(d[0]),d[5]<.1?2:0)+(d[2]?' '+d[2]:'')});q('diag').textContent='Fn '+fmt(r.fn,3)+' ôñ '+r.reg+'. Arraste para girar. CûÂmera inicial corrigida para vista 3/4.';q('badge').textContent=r.gm>.35?'OK PRELIMINAR':r.gm>0?'ATENûûO':'CRûTICO';q('badge').style.background=r.gm>.35?'#064e3b':r.gm>0?'#713f12':'#7f1d1d'}function update(){draw()}function resetView(){yaw=-.72;pitch=.42;draw()}function preset(n){if(n===1){q('type').value='center';q('lwl').value=12;q('beam').value=3.2;q('draft').value=.55;q('speed').value=22;q('cb').value=.42;q('cp').value=.65;q('cwp').value=.78;q('vcg').value=1.1}if(n===2){q('type').value='bow';q('lwl').value=9;q('beam').value=2.7;q('draft').value=.42;q('speed').value=34;q('cb').value=.36;q('cp').value=.72;q('cwp').value=.75;q('vcg').value=.95}if(n===3){q('type').value='work';q('lwl').value=14;q('beam').value=4.3;q('draft').value=.95;q('speed').value=14;q('cb').value=.58;q('cp').value=.66;q('cwp').value=.82;q('vcg').value=1.55}draw()}var cv=q('cv');function pos(e){var r=cv.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}cv.addEventListener('mousedown',function(e){drag=true;lx=e.offsetX;ly=e.offsetY});window.addEventListener('mouseup',function(){drag=false});cv.addEventListener('mousemove',function(e){if(!drag)return;yaw+=(e.offsetX-lx)*.01;pitch+=(e.offsetY-ly)*.01;pitch=Math.max(-1.0,Math.min(1.0,pitch));lx=e.offsetX;ly=e.offsetY;draw()});cv.addEventListener('touchstart',function(e){var p=pos(e);drag=true;lx=p.x;ly=p.y;e.preventDefault()},{passive:false});cv.addEventListener('touchmove',function(e){if(!drag)return;var p=pos(e);yaw+=(p.x-lx)*.01;pitch+=(p.y-ly)*.01;pitch=Math.max(-1.0,Math.min(1.0,pitch));lx=p.x;ly=p.y;draw();e.preventDefault()},{passive:false});cv.addEventListener('touchend',function(){drag=false});document.addEventListener('input',function(e){if(e.target.matches('input,select'))draw()});draw();</script></body></html>
